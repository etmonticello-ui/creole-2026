<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Creole '26 Scorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-24">
    <div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-2xl relative">
        <div class="flex items-center justify-center h-screen">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-slate-900"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- FIREBASE SETUP ---
        // PASTE YOUR FIREBASE CONFIG HERE FROM THE FIREBASE CONSOLE
        const firebaseConfig = {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        const INITIAL_DATA = {
            course: {
                day1: { 
                    name: "Prestonwood (Fairways)", 
                    pars: [4,3,5,4,3,4,3,4,4, 5,4,3,5,4,3,4,4,4], 
                    hcps: [12,16,8,2,10,4,18,14,6, 7,5,17,9,11,15,13,3,1] 
                },
                day2: { 
                    name: "Treyburn CC", 
                    pars: [4,3,4,5,4,4,3,4,5, 4,5,4,3,4,5,4,3,4], 
                    hcps: [13,17,1,5,3,11,15,7,9, 14,12,6,18,2,4,10,16,8] 
                }
            },
            matches: {
                day1: [
                    { id: "d1m1", time: "1:30pm", teamA: ["Barrett Knowles", "Will Baskervill"], hcpA: 2, teamB: ["Brent Calabria", "Boyd King"], hcpB: 6 },
                    { id: "d1m2", time: "1:40pm", teamA: ["Jason Fulp", "Mike Lyons"], hcpA: 6, teamB: ["Spencer Harris", "John Morgan"], hcpB: 3 },
                    { id: "d1m3", time: "1:50pm", teamA: ["Bradford Riddle", "Chris Nichols"], hcpA: 6, teamB: ["Travis Monticello", "Bob Wilson"], hcpB: 5 },
                ],
                day2: [
                    { id: "d2m1", time: "12:00pm", playerA: "Barrett Knowles", hcpA: 7, playerB: "Travis Monticello", hcpB: 8 },
                    { id: "d2m2", time: "12:00pm", playerA: "Mike Lyons", hcpA: 35, playerB: "Bob Wilson", hcpB: 24 },
                    { id: "d2m3", time: "12:10pm", playerA: "Chris Nichols", hcpA: 18, playerB: "Brent Calabria", hcpB: 20 },
                    { id: "d2m4", time: "12:10pm", playerA: "Jason Fulp", hcpA: 5, playerB: "Spencer Harris", hcpB: 5 },
                    { id: "d2m5", time: "12:20pm", playerA: "Will Baskervill", hcpA: 9, playerB: "John Morgan", hcpB: 13 },
                    { id: "d2m6", time: "12:20pm", playerA: "Bradford Riddle", hcpA: 12, playerB: "Boyd King", hcpB: 13 },
                ]
            },
            teamPlayers: {
                cucks: ["Barrett Knowles", "Jason Fulp", "Will Baskervill", "Bradford Riddle", "Chris Nichols", "Mike Lyons"],
                notCucks: ["Travis Monticello", "Spencer Harris", "Boyd King", "Brent Calabria", "John Morgan", "Bob Wilson"]
            }
        };

        const PRIZES = { team: 1200, skins: 600 };
        const APP_IDENTIFIER = 'creole-invitational-2026';

        let state = { 
            activeTab: 'dashboard', 
            activeDay: 1, 
            selectedMatchId: null, 
            data: { scores: {}, hcps: {} }, 
            syncing: true,
            isCloud: !!firebaseConfig.apiKey 
        };

        const initApp = async () => {
            if (state.isCloud) {
                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);
                const auth = getAuth(app);
                await signInAnonymously(auth);
                onAuthStateChanged(auth, u => {
                    if (u) {
                        onSnapshot(doc(db, 'tournaments', APP_IDENTIFIER), s => {
                            if (s.exists()) state.data = s.data();
                            state.syncing = false;
                            window.render();
                        });
                    }
                });
            } else {
                // Local Fallback
                const saved = localStorage.getItem(APP_IDENTIFIER);
                if (saved) state.data = JSON.parse(saved);
                state.syncing = false;
                window.render();
            }
        };

        window.saveData = async () => {
            if (state.isCloud) {
                const db = getFirestore();
                await setDoc(doc(db, 'tournaments', APP_IDENTIFIER), state.data);
            } else {
                localStorage.setItem(APP_IDENTIFIER, JSON.stringify(state.data));
            }
            window.render();
        };

        window.setS = (mId, hIdx, side, val) => {
            state.data.scores[`${mId}-${hIdx}-${side}`] = parseInt(val) || 0;
            window.saveData();
        };

        window.setH = (mId, side, val) => {
            state.data.hcps[`${mId}-${side}`] = parseInt(val) || 0;
            window.saveData();
        };

        // --- CALCS ---
        function getMatchH(m, side) {
            return state.data.hcps[`${m.id}-${side}`] !== undefined ? state.data.hcps[`${m.id}-${side}`] : (side === 'A' ? m.hcpA : m.hcpB);
        }

        function getNet(g, h, r) {
            if (!g) return null;
            return g - (Math.floor(h / 18) + (r <= (h % 18) ? 1 : 0));
        }

        function getStatus(m) {
            const c = INITIAL_DATA.course[`day${state.activeDay}`];
            const hA = getMatchH(m, 'A'), hB = getMatchH(m, 'B');
            const diff = Math.abs(hA - hB), low = hA < hB ? 'A' : 'B';
            let sA = 0, sB = 0, played = 0;
            for (let i = 0; i < 18; i++) {
                const gA = state.data.scores[`${m.id}-${i}-A`], gB = state.data.scores[`${m.id}-${i}-B`];
                if (gA > 0 && gB > 0) {
                    played++;
                    const nA = gA - (low === 'B' && c.hcps[i] <= diff ? 1 : 0);
                    const nB = gB - (low === 'A' && c.hcps[i] <= diff ? 1 : 0);
                    if (nA < nB) sA++; else if (nB < nA) sB++;
                }
            }
            const cur = sA - sB, rem = 18 - played;
            if (Math.abs(cur) > rem) return { winner: cur > 0 ? 'A' : 'B', text: `${Math.abs(cur)} & ${rem}`, done: true };
            if (rem === 0) return { winner: cur === 0 ? 'T' : (cur > 0 ? 'A' : 'B'), text: cur === 0 ? 'Halved' : `${Math.abs(cur)} up`, done: true };
            return { winner: cur === 0 ? 'AS' : (cur > 0 ? 'A' : 'B'), text: cur === 0 ? 'AS' : `${Math.abs(cur)} up`, done: false };
        }

        function getSkins(day) {
            const c = INITIAL_DATA.course[`day${day}`], matches = INITIAL_DATA.matches[`day${day}`];
            let skins = [];
            for (let h = 0; h < 18; h++) {
                let pool = [];
                matches.forEach(m => {
                    const gA = state.data.scores[`${m.id}-${h}-A`], gB = state.data.scores[`${m.id}-${h}-B`];
                    const hA = getMatchH(m, 'A'), hB = getMatchH(m, 'B');
                    if (gA > 0) pool.push({ names: day === 1 ? m.teamA : [m.playerA], g: gA, n: getNet(gA, hA, c.hcps[h]) });
                    if (gB > 0) pool.push({ names: day === 1 ? m.teamB : [m.playerB], g: gB, n: getNet(gB, hB, c.hcps[h]) });
                });
                if (pool.length) {
                    const minN = Math.min(...pool.map(x => x.n));
                    const winN = pool.filter(x => x.n === minN);
                    if (winN.length === 1 && !pool.find(x => x !== winN[0] && x.g === minN)) {
                        skins.push({ h: h + 1, names: winN[0].names, g: winN[0].g });
                    }
                }
            }
            return { list: skins, val: skins.length ? 300 / skins.length : 0 };
        }

        window.render = () => {
            const app = document.getElementById('app');
            const pts = (() => {
                let c = 0, n = 0;
                [1, 2].forEach(d => INITIAL_DATA.matches[`day${d}`].forEach(m => {
                    const r = getStatus(m);
                    if (r.done) { if (r.winner === 'A') c++; else if (r.winner === 'B') n++; else { c += 0.5; n += 0.5; } }
                }));
                return { c, n };
            })();

            let html = `
                <header class="bg-white border-b px-6 py-5 sticky top-0 z-30 flex justify-between items-center">
                    <div><h1 class="text-xl font-black italic tracking-tighter">CREOLE '26</h1><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mt-0.5">Invitational Scorer</p></div>
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full ${state.syncing && state.isCloud ? 'bg-amber-400 animate-pulse' : (state.isCloud ? 'bg-emerald-500' : 'bg-slate-300')}"></div>
                        <button onclick="window.state.activeDay = window.state.activeDay === 1 ? 2 : 1; window.render();" class="bg-slate-900 text-white px-3 py-2 rounded-xl text-[10px] font-black uppercase">Day ${state.activeDay}</button>
                    </div>
                </header>
                <main class="p-6">
            `;

            if (state.activeTab === 'dashboard') {
                html += `
                    <div class="flex gap-3 mb-8">
                        <div class="flex-1 bg-blue-900 text-white rounded-2xl p-5 text-center shadow-lg border-b-4 border-blue-950"><div class="text-[10px] opacity-60 uppercase font-black mb-1">Cucks</div><div class="text-4xl font-black">${pts.c}</div></div>
                        <div class="flex-1 bg-red-900 text-white rounded-2xl p-5 text-center shadow-lg border-b-4 border-red-950"><div class="text-[10px] opacity-60 uppercase font-black mb-1">Not Cucks</div><div class="text-4xl font-black">${pts.n}</div></div>
                    </div>
                    <div class="space-y-3">
                        ${INITIAL_DATA.matches[`day${state.activeDay}`].map(m => {
                            const r = getStatus(m);
                            return `<div onclick="window.state.selectedMatchId='${m.id}'; window.state.activeTab='score'; window.render();" class="bg-white p-4 rounded-xl border flex justify-between items-center active:scale-95 transition-all">
                                <div class="text-[11px] font-bold">
                                    <div class="text-slate-400 text-[9px] mb-1">${m.time}</div>
                                    <div class="${r.winner === 'A' ? 'text-blue-700' : ''}">${state.activeDay === 1 ? m.teamA.join(' / ') : m.playerA} (${getMatchH(m, 'A')})</div>
                                    <div class="${r.winner === 'B' ? 'text-red-700' : ''}">${state.activeDay === 1 ? m.teamB.join(' / ') : m.playerB} (${getMatchH(m, 'B')})</div>
                                </div>
                                <div class="px-3 py-1.5 rounded-full text-[10px] font-black uppercase ${r.done ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-50 text-slate-400'}">${r.text}</div>
                            </div>`;
                        }).join('')}
                    </div>
                `;
            } else if (state.activeTab === 'score') {
                const m = INITIAL_DATA.matches[`day${state.activeDay}`].find(x => x.id === state.selectedMatchId);
                if (!m) html += `<div class="text-center py-20 text-slate-400 font-black uppercase text-xs tracking-widest">Select a match to score</div>`;
                else {
                    const c = INITIAL_DATA.course[`day${state.activeDay}`], hA = getMatchH(m, 'A'), hB = getMatchH(m, 'B'), diff = Math.abs(hA-hB), low = hA < hB ? 'A' : 'B';
                    html += `
                        <div class="bg-slate-900 text-white p-4 rounded-2xl mb-4 sticky top-20 z-10 shadow-xl border-b-4 border-slate-800">
                            <div class="flex justify-between items-center text-center">
                                <div class="flex-1">
                                    <div class="text-[8px] font-bold text-blue-400 uppercase">TEAM A</div>
                                    <div class="text-[10px] font-black h-8 flex items-center justify-center">${state.activeDay === 1 ? m.teamA.join('<br>') : m.playerA}</div>
                                    <input type="number" onchange="window.setH('${m.id}','A',this.value)" value="${hA}" class="w-10 h-6 bg-white/10 rounded mt-1 text-center text-[10px] font-black border-none">
                                </div>
                                <div class="px-2 text-lg font-black italic tracking-tighter">${getStatus(m).text}</div>
                                <div class="flex-1">
                                    <div class="text-[8px] font-bold text-red-400 uppercase">TEAM B</div>
                                    <div class="text-[10px] font-black h-8 flex items-center justify-center">${state.activeDay === 1 ? m.teamB.join('<br>') : m.playerB}</div>
                                    <input type="number" onchange="window.setH('${m.id}','B',this.value)" value="${hB}" class="w-10 h-6 bg-white/10 rounded mt-1 text-center text-[10px] font-black border-none">
                                </div>
                            </div>
                        </div>
                        ${c.pars.map((p, i) => {
                            const r = c.hcps[i], sA = (low === 'B' && r <= diff) ? '●' : '', sB = (low === 'A' && r <= diff) ? '●' : '';
                            return `<div class="bg-white border rounded-2xl p-3 flex items-center gap-3 mb-2">
                                <div class="w-6 text-center font-black text-slate-300 text-lg">${i+1}</div>
                                <div class="flex-1 grid grid-cols-2 gap-3">
                                    <div class="relative"><input type="number" inputmode="numeric" onchange="window.setS('${m.id}',${i},'A',this.value)" value="${state.data.scores[`${m.id}-${i}-A`] || ''}" class="w-full bg-blue-50/50 rounded-xl text-center h-12 font-black border-none"><span class="absolute top-1 right-2 text-[10px] text-blue-600 font-bold">${sA}</span></div>
                                    <div class="relative"><input type="number" inputmode="numeric" onchange="window.setS('${m.id}',${i},'B',this.value)" value="${state.data.scores[`${m.id}-${i}-B`] || ''}" class="w-full bg-red-50/50 rounded-xl text-center h-12 font-black border-none"><span class="absolute top-1 right-2 text-[10px] text-red-600 font-bold">${sB}</span></div>
                                </div>
                                <div class="text-[8px] font-black text-slate-300 uppercase">Par ${p}</div>
                            </div>`;
                        }).join('')}
                    `;
                }
            } else if (state.activeTab === 'leaderboard') {
                const s = getSkins(state.activeDay);
                html += `
                    <h2 class="font-black text-lg uppercase mb-4 tracking-tighter">Skins - Day ${state.activeDay}</h2>
                    <div class="bg-white border rounded-3xl overflow-hidden shadow-sm">
                        <div class="p-4 bg-slate-50 flex justify-between items-center text-[10px] font-black uppercase text-slate-400">
                            <span>Skins Won: ${s.list.length}</span><span class="text-emerald-600">$${s.val.toFixed(2)} ea</span>
                        </div>
                        <table class="w-full text-left">
                            <thead class="text-[8px] uppercase font-black text-slate-400 border-b"><tr><th class="px-6 py-3">Hole</th><th class="px-6 py-3">Winner</th><th class="px-6 py-3 text-right">Gross</th></tr></thead>
                            <tbody class="divide-y divide-slate-50">
                                ${s.list.map(x => `<tr><td class="px-6 py-5 font-black text-slate-300 text-lg">${x.h}</td><td class="px-6 py-5 text-xs font-bold leading-tight">${x.names.join('<br>')}</td><td class="px-6 py-5 text-right font-black text-emerald-600 italic underline">${x.g}</td></tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } else if (state.activeTab === 'prizes') {
                const w = (() => {
                    const ws = {}; const all = [...INITIAL_DATA.teamPlayers.cucks, ...INITIAL_DATA.teamPlayers.notCucks];
                    all.forEach(p => ws[p] = { total: 0, items: [] });
                    const s1 = getSkins(1), s2 = getSkins(2);
                    if (pts.c !== pts.n) { (pts.c > pts.n ? INITIAL_DATA.teamPlayers.cucks : INITIAL_DATA.teamPlayers.notCucks).forEach(p => ws[p].total += 200); } else all.forEach(p => ws[p].total += 100);
                    s1.list.forEach(s => s.names.forEach(n => { ws[n].total += s1.val / s.names.length; ws[n].items.push(`D1 H${s.h} (${s.g})`); }));
                    s2.list.forEach(s => s.names.forEach(n => { ws[n].total += s2.val; ws[n].items.push(`D2 H${s.h} (${s.g})`); }));
                    return ws;
                })();
                const sorted = Object.entries(w).sort((a,b) => b[1].total - a[1].total);
                html += `
                    <h2 class="font-black text-lg uppercase mb-5 tracking-tighter">Prizes</h2>
                    <div class="space-y-3 bg-white border rounded-2xl p-6 shadow-sm">
                        ${sorted.map(([name, data]) => `
                            <div class="border-b border-slate-50 pb-3 last:border-0">
                                <div class="flex justify-between items-center text-xs"><span class="font-bold text-slate-700">${name}</span><span class="font-black text-emerald-600 italic text-sm">$${data.total.toFixed(2)}</span></div>
                                ${data.items.length ? `<div class="text-[9px] text-slate-400 mt-1 italic">${data.items.join(', ')}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            html += `</main><nav class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-[380px] bg-white border rounded-2xl p-1 flex justify-between items-center shadow-2xl z-40">
                ${[{id:'dashboard',icon:'layout-dashboard',label:'Home'},{id:'score',icon:'users',label:'Score'},{id:'leaderboard',icon:'trophy',label:'Skins'},{id:'prizes',icon:'dollar-sign',label:'Prizes'}].map(t => `<button onclick="window.state.activeTab='${t.id}'; window.render();" class="flex-1 flex flex-col items-center gap-1 py-2.5 rounded-xl transition-all ${state.activeTab === t.id ? 'bg-slate-900 text-white shadow-xl' : 'text-slate-400'}"><i data-lucide="${t.icon}" class="w-4 h-4"></i><span class="text-[8px] font-black uppercase tracking-tighter">${t.label}</span></button>`).join('')}
            </nav>`;
            app.innerHTML = html;
            lucide.createIcons();
        }

        window.state = state;
        initApp();
    </script>
</body>
</html>
